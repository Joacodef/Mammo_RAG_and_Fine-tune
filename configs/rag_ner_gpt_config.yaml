# Configuration for the Retrieval-Augmented Generation (RAG) pipeline.
# This file centralizes settings for the LLM provider, vector database,
# and prompting strategies for the NER task.

task: ner

# Test file
test_file: "data/processed/test.jsonl"

# --- LLM Configuration ---
llm:
  # The active provider to be used by the factory.
  provider: "openai"

  # --- Provider-Specific Configurations ---

  # Settings for the OpenAI client.
  openai:
    # Specifies the exact model to use from the OpenAI API.
    model: "gpt-4o"

    # Controls the randomness of the output.
    temperature: 0.1

    # Settings for handling API requests, including timeouts and retries.
    request_settings:
      max_retries: 3
      initial_timeout_seconds: 60
      backoff_factor: 1.5


# --- Vector Database Configuration ---
vector_db:
  # Path where the FAISS index file will be stored.
  index_path: "output/vector_db/faiss_index_clean.bin"

  # Path to the source data used to build the vector database.
  source_data_path: "data/processed/train-50/sample-1/train.jsonl"

  # The name of the sentence-transformer model to use for generating embeddings.
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"


# --- RAG Prompting Configuration ---
rag_prompt:
  # Path to the text file containing the prompt template.
  prompt_template_path: "prompts/rag_ner_prompt_spanish.txt"
  
  # The number of similar examples to retrieve from the vector database
  # to include in the few-shot prompt.
  n_examples: 3

  # If set to false, overlapping entities will be resolved by keeping the longest one.
  allow_entity_overlap: false

  # The list of entity labels to be extracted by the LLM.
  entity_labels:
    - name: "HALL_presente"
      description: "hallazgos presentes, observaciones de posible importancia patológica. En la gran mayoría de los casos son sólo una palabra, tales como: 'nódulo', 'microcalcificaciones', 'quistes', 'asimetría', etc. En casos particulares, se requiere más de una palabra, como 'clips quirúrgicos' o 'imágenes espiculadas'."
    - name: "HALL_ausente"
      description: "hallazgos ausentes, menciones de hallazgos no presentes, se marca el mismo tipo de palabras que en HALL_presente, pero que hayan sido negadas."
    - name: "CARACT"
      description: "características asociadas a hallazgos presentes o ausentes, tales como: 'isodenso', 'agrupadas', 'bordes bien definidos', etc."
    - name: "CUAD"
      description: "cuadrante de la mama, tales como: 'cuadrante superior interno', 'cuadrante inferoexterno', etc."
    - name: "LAT"
      description: "lateralidad de la mama, puede ser 'derecha', 'izquierda', 'bilateral', 'ambas mamas', etc."
    - name: "REG"
      description: "región de la mama, puede ser 'tercio superior', 'regiones axilares', etc."
    - name: "DENS"
      description: "frases que se refieran a características generales de la densidad mamaria."
